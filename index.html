let lastRafYRange = null;
let lastRafXRange = null;
window._obNeedsRedraw = false;
window._hmNeedsRedraw = true;  // forza il primo disegno

function drawFootprint(fpData, yMin, yMax, xMin, xMax) {
    const fpCanvas = document.getElementById('fp-canvas');
    if (!fpCanvas || !chart) return;
    const ctx = fpCanvas.getContext('2d');
    const w = chart.getWidth(), h = chart.getHeight();
    if (fpCanvas.width !== w || fpCanvas.height !== h) {
        fpCanvas.width = w; fpCanvas.height = h;
    }
    ctx.clearRect(0, 0, w, h);

    if (!currentCandleData || currentCandleData.length < 2) return;

    // Distanza in pixel tra le candele attuali
    const c1X = chart.convertToPixel({xAxisIndex: 0}, currentCandleData[0][0]);
    const c2X = chart.convertToPixel({xAxisIndex: 0}, currentCandleData[1][0]);
    const pxPerCandle = Math.abs(c2X - c1X);

    // Condizione trigger: compare solo se c'è ampio spazio tra le candele
    if (pxPerCandle <= 25) return;

    const pStep = window._vpStep || 10;
    const yTopPx = chart.convertToPixel({yAxisIndex: 0}, yMax);
    const yBotPx = chart.convertToPixel({yAxisIndex: 0}, yMin);
    const pxPerPrice = (yBotPx - yTopPx) / (yMax - yMin);
    
    // Altezza della riga con 1px di padding
    const barH = Math.max(1, Math.abs(pStep * pxPerPrice) - 1);
    
    // Calcoliamo l'esatta larghezza dinamica della candela definita da ECharts
    const candleHalfW = Math.max(1, Math.min(pxPerCandle * 0.7, 40)) / 2;
    
    // Lo spazio rimanente tra le candele viene usato per le barre del footprint
    const maxBarW = (pxPerCandle / 2) - candleHalfW - 2;

    ctx.font = 'bold 9px sans-serif';
    ctx.textBaseline = 'middle';

    for (const [tsStr, levels] of Object.entries(fpData)) {
        const ts = parseInt(tsStr) * 1000;
        if (ts < xMin || ts > xMax) continue;

        const cx = chart.convertToPixel({xAxisIndex: 0}, ts);

        // Trova il volume massimo della candela (POC) per la normalizzazione laterale
        let maxVol = 0;
        for (const lvl of levels) {
            const tot = lvl[1] + lvl[2];
            if (tot > maxVol) maxVol = tot;
        }
        if (maxVol === 0) continue;

        for (const lvl of levels) {
            const p = lvl[0], buy = lvl[1], sell = lvl[2];
            if (p < yMin - pStep || p > yMax + pStep) continue;

            const y = chart.convertToPixel({yAxisIndex: 0}, p) - barH / 2;

            const buyW = (buy / maxVol) * maxBarW;
            const sellW = (sell / maxVol) * maxBarW;
            const isPoc = (buy + sell) === maxVol;

            // Sell (Arancio) - Proietta verso Sinistra attaccato al bordo sinistro della candela
            if (sellW > 0) {
                // Evidenzia il POC (nodo di volume massimo della candela) rendendolo più opaco
                ctx.fillStyle = isPoc ? 'rgba(249, 115, 22, 0.95)' : 'rgba(249, 115, 22, 0.65)'; 
                ctx.fillRect(cx - candleHalfW - sellW, y, sellW, barH);
            }
            
            // Buy (Viola) - Proietta verso Destra attaccato al bordo destro della candela
            if (buyW > 0) {
                ctx.fillStyle = isPoc ? 'rgba(168, 85, 247, 0.95)' : 'rgba(168, 85, 247, 0.65)'; 
                ctx.fillRect(cx + candleHalfW, y, buyW, barH);
            }

            // Testo del volume se lo zoom verticale è profondo (le righe sono spesse)
            if (barH >= 7 && pxPerCandle >= 10) {
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                if (sell > 200) {
                    ctx.textAlign = 'right';
                    ctx.fillText(fmtVol(sell), cx - candleHalfW - 2, y + barH / 2);
                }
                if (buy > 200) {
                    ctx.textAlign = 'left';
                    ctx.fillText(fmtVol(buy), cx + candleHalfW + 2, y + barH / 2);
                }
            }
        }
    }
}

function syncOverlays() {
    const yExt = getYRange();
    let xExt = null;
    try { xExt = chart.getModel().getComponent('xAxis', 0).axis.scale.getExtent(); } catch(e){}

    if (yExt && xExt) {
        const epsY = (yExt.max - yExt.min) * 0.0001;
        const epsX = (xExt[1] - xExt[0]) * 0.0001;

        const rangeChanged = !lastRafYRange || !lastRafXRange ||
            Math.abs(lastRafYRange.min - yExt.min) > epsY ||
            Math.abs(lastRafYRange.max - yExt.max) > epsY ||
            Math.abs(lastRafXRange.min - xExt[0]) > epsX ||
            Math.abs(lastRafXRange.max - xExt[1]) > epsX;

        // Heatmap: throttle a 60ms (evita ridisegno WebGL ad ogni frame durante pan)
        const now = performance.now();
        const hmReady = !window._hmLastDraw || (now - window._hmLastDraw) >= 60;
        if ((rangeChanged || window._hmNeedsRedraw) && hmReady) {
            lastRafYRange = { min: yExt.min, max: yExt.max };
            lastRafXRange = { min: xExt[0], max: xExt[1] };
            drawHeatmapCanvas();
            window._hmNeedsRedraw = false;
            window._hmLastDraw = now;
        }

        // Volume Profile: throttle a 80ms (il disegno Canvas2D è più leggero ma il loop è rapido)
        const vpReady = !window._vpLastDraw || (now - window._vpLastDraw) >= 80;
        if ((rangeChanged || window._obNeedsRedraw) && vpReady) {
            if (lastVpRawData) { drawVolumeProfile(lastVpRawData); window._vpLastDraw = now; }
            if (lastObData && lastObData.book) drawOrderBook(lastObData.book, lastObData.step, lastPrice, yExt.min, yExt.max);
            
            // AGGIUNTA FOOTPRINT
            drawFootprint(lastFootprintData, yExt.min, yExt.max, xExt[0], xExt[1]);
            window._obNeedsRedraw = false;
        }
    }
    requestAnimationFrame(syncOverlays);
}
requestAnimationFrame(syncOverlays);

function findNearestValue(arr, targetTs, maxDistMs = 30000) {
    if (!arr || arr.length === 0) return null;
    let best = null, bestDist = Infinity;
    for (const pt of arr) {
        const dist = Math.abs(pt[0] - targetTs);
        if (dist < bestDist) { bestDist = dist; best = pt[1]; }
    }
    return bestDist <= maxDistMs ? best : null;
}

deltaChart.getZr().on('mousemove', function(params) {
    const evt = params.event;
    const panel = document.getElementById('delta-panel');
    const pr = panel.getBoundingClientRect();
    const point = deltaChart.convertFromPixel({seriesIndex: 0}, [params.offsetX, params.offsetY]);
    if (!point || point.length < 2) { deltaTooltip.style.display = 'none'; return; }
    const t = point[0];
    const deltaVal = findNearestValue(globalDeltaHistory, t);
    const nvecVal  = findNearestValue(globalNvecHistory, t);
    const tdVal    = findNearestValue(globalTradeDeltaHistory, t);
    if (deltaVal === null && nvecVal === null && tdVal === null) {

        html += `<div class="tt-row"><span class="tt-label">OB Delta:</span><span class="tt-val" style="color:${col};">${deltaVal >= 0 ? '+' : ''}${fmtVol(deltaVal)}</span></div>`;
    }

        html += `<div class="tt-row"><span class="tt-label">Trade Δ:</span><span class="tt-val" style="color:${col};">${tdVal >= 0 ? '+' : ''}${fmtVol(tdVal)} BTC</span></div>`;

        html += `<div class="tt-row"><span class="tt-label">NVEC:</span><span class="tt-val" style="color:#00f2ff;">${nvecVal.toFixed(1)}</span></div>`;
    }
    deltaTooltip.innerHTML = html;
    deltaTooltip.style.display = 'block';
    let left = (evt.clientX - pr.left) + 14;

function getYRange() {
    try {
        // Il metodo definitivo per allineare Canvas custom (VP/OB) a ECharts
        // Estrae l'estensione matematica esatta dell'asse Y attualmente renderizzata
        const yAxis = chart.getModel().getComponent('yAxis', 0).axis;
        const extent = yAxis.scale.getExtent();

        if (extent && extent.length === 2 && !isNaN(extent[0]) && !isNaN(extent[1])) {

        }
        return null;
    } catch (e) {

    }
}

// --- ORDER BOOK CANVAS ---
const obCanvas = document.getElementById('ob-canvas');
const obCtx = obCanvas.getContext('2d');

// Cache volumi OB per smoothing anti-flicker (EMA)
const _obVolumeCache = { bids: new Map(), asks: new Map(), localMax: 100 };
const OB_SMOOTHING_ALPHA = 0.25; // 0=mai cambia, 1=istantaneo
const OB_MAX_DECAY = 0.15;      // quanto scende max quando non c'è più quel volume

function drawOrderBook(book, step, price, yMin, yMax) {
        const w = obCanvas.clientWidth, h = obCanvas.clientHeight;
        if (w === 0 || h === 0 || yMin == null || yMax == null) return;
        obCanvas.width = w; obCanvas.height = h;
        obCtx.clearRect(0, 0, w, h);

        const pRange = yMax - yMin;
        if (pRange <= 0) return;
        
        const labelW = 48;
        const barMaxW = w - labelW - 6;
        
        // Aumentato padTop da 3 a 18 per fare spazio pulito alla scala superiore
        const padTop = 18, padBottom = 25, drawH = h - padTop - padBottom; 

        function priceToObY(p) { return padTop + ((yMax - p) / pRange * drawH); }

        // --- 1. ETICHETTE PREZZO SULL'ASSE ---
        const idealStep = pRange / (drawH / 22);
        const validSteps = [5, 10, 25, 50, 100, 200, 500, 1000, 2000, 5000];
        const stepLabels = validSteps.find(s => s >= idealStep) || 5000;

        for (let lbl = Math.ceil(yMin / stepLabels) * stepLabels; lbl <= yMax; lbl += stepLabels) {
            const y = priceToObY(lbl);
            if (y == null) continue;
            obCtx.strokeStyle = 'rgba(42,46,57,0.4)';
            obCtx.lineWidth = 0.5;
            obCtx.beginPath(); obCtx.moveTo(labelW, y); obCtx.lineTo(w, y); obCtx.stroke();
            obCtx.fillStyle = '#6b7280'; obCtx.font = '9px sans-serif'; obCtx.textAlign = 'right';
            obCtx.textBaseline = 'middle';
            obCtx.fillText(lbl.toFixed(0), labelW - 4, y);
        }

        // --- 2. PREPARA DATI (senza ri-aggregazione: dati server già bucketizzati) ---
        // Usiamo i prezzi dal server direttamente — sono già bucketizzati
        const bidsMap = new Map();
        const asksMap = new Map();
        let instantMax = 0;
        
        if (book) {
            (book.bids || []).forEach(([p, v]) => {
                if (p >= yMin - step && p <= yMax + step && v > 0) {
                    bidsMap.set(p, v);
                    if (v > instantMax) instantMax = v;
                }
            });
            (book.asks || []).forEach(([p, v]) => {
                if (p >= yMin - step && p <= yMax + step && v > 0) {
                    asksMap.set(p, v);
                    if (v > instantMax) instantMax = v;
                }
            });
        }

        // --- 3. SMOOTHING EMA sui volumi ---
        // I volumi non scompaiono istantaneamente ma decadono gradualmente
        const smoothBids = new Map();
        const smoothAsks = new Map();
        
        // Decay: volumi che non sono più presenti scendono gradualmente
        for (const [p, oldV] of _obVolumeCache.bids) {
            if (!bidsMap.has(p)) {
                const decayed = oldV * (1 - OB_MAX_DECAY);
                if (decayed > 0.5) smoothBids.set(p, decayed);
            }
        }
        for (const [p, oldV] of _obVolumeCache.asks) {
            if (!asksMap.has(p)) {
                const decayed = oldV * (1 - OB_MAX_DECAY);
                if (decayed > 0.5) smoothAsks.set(p, decayed);
            }
        }
        
        // Merge: nuovi volumi con EMA, vecchi con decay
        for (const [p, newV] of bidsMap) {
            const oldV = _obVolumeCache.bids.get(p) || 0;
            const smoothed = oldV + (newV - oldV) * OB_SMOOTHING_ALPHA;
            smoothBids.set(p, smoothed);
        }
        for (const [p, newV] of asksMap) {
            const oldV = _obVolumeCache.asks.get(p) || 0;
            const smoothed = oldV + (newV - oldV) * OB_SMOOTHING_ALPHA;
            smoothAsks.set(p, smoothed);
        }
        
        // Aggiorna cache
        _obVolumeCache.bids = smoothBids;
        _obVolumeCache.asks = smoothAsks;

        // --- 4. SMOOTHING su localMax ---
        // La scala massima non oscilla bruscamente: fast attack, slow decay
        const prevMax = _obVolumeCache.localMax;
        if (instantMax > prevMax) {
            _obVolumeCache.localMax = instantMax; // attacco rapido
        } else {
            _obVolumeCache.localMax = prevMax * 0.92 + instantMax * 0.08; // rilascio lento
        }
        let localMax = Math.max(100, _obVolumeCache.localMax);

        // --- 5. SCALA DEI VOLUMI (HEADER) ---
        obCtx.fillStyle = 'rgba(10,10,15,0.95)';
        obCtx.fillRect(0, 0, w, padTop - 2);

        const scaleY = padTop - 4;
        obCtx.strokeStyle = '#4b5563';
        obCtx.lineWidth = 1;
        obCtx.beginPath(); obCtx.moveTo(labelW + 2, scaleY); obCtx.lineTo(w - 4, scaleY); obCtx.stroke();

        obCtx.fillStyle = '#9ca3af';
        obCtx.font = 'bold 9px sans-serif'; obCtx.textAlign = 'right'; obCtx.textBaseline = 'bottom';
        obCtx.fillText('BID', labelW + barMaxW / 2 - 4, scaleY - 1);
        obCtx.fillStyle = '#ef4444';
        obCtx.fillText('ASK', w - 5, scaleY - 1);

        // Tacche: 0% al centro, 50% e 100% verso i bordi (simmetrico)
        const centerX  = labelW + 2 + barMaxW / 2;
        const halfMaxW = barMaxW / 2;
        const obVolTicks = [0, 0.5, 1.0];
        obVolTicks.forEach(volFrac => {
            const xRight = centerX + Math.sqrt(volFrac) * halfMaxW;
            const xLeft  = centerX - Math.sqrt(volFrac) * halfMaxW;
            const label  = volFrac === 0 ? '0' : fmtVol(localMax * volFrac);
            [xLeft, xRight].forEach((x, idx) => {
                obCtx.fillStyle = '#9ca3af';
                obCtx.fillRect(x, scaleY - 3, 1, 3);
                if (volFrac > 0) {
                    obCtx.fillStyle = '#d1d5db';
                    obCtx.textAlign = 'right';
                    obCtx.fillText(label, x, scaleY - 4);
                } else {
                    obCtx.fillStyle = '#d1d5db';
                    obCtx.textAlign = 'center';
                    obCtx.fillText(label, x, scaleY - 4);
                }
            });
        });

        // --- 6. DISEGNO BARRE (split: bids sx, asks dx dal centro) ---
        const center = labelW + 2 + barMaxW / 2;
        const halfW  = barMaxW / 2;

        const allP = Array.from(new Set([...smoothBids.keys(), ...smoothAsks.keys()])).map(Number).sort((a,b) => a-b);

        allP.forEach(p => {
            const rawBV = smoothBids.get(p) || 0;
            const rawAV = smoothAsks.get(p) || 0;
            
            // CALCOLO NET VOLUME
            const netVol = rawBV - rawAV;
            if (Math.abs(netVol) < 0.1) return; // Salta livelli vuoti
            
            // Assegna il volume residuo alla side vincente
            const bV = netVol > 0 ? netVol : 0;
            const aV = netVol < 0 ? Math.abs(netVol) : 0;

            const y = priceToObY(p);
            const rowH = Math.max(1.5, Math.abs(priceToObY(p) - priceToObY(p + step)));

            // Asks: crescono da center verso destra
            if (aV > 0) {
                const wFrac = Math.sqrt(aV / localMax);
                const barW  = wFrac * halfW;
                let color;
                if (wFrac <= 0.5) color = lerpColor('#220101', '#a70006', wFrac / 0.5);
                else              color = lerpColor('#a70006', '#fca5a5', (wFrac - 0.5) / 0.5);
                obCtx.fillStyle = color;
                obCtx.fillRect(center, y - rowH / 2, barW, rowH);
            }
            // Bids: crescono da center verso sinistra
            if (bV > 0) {
                const wFrac = Math.sqrt(bV / localMax);
                const barW  = wFrac * halfW;
                let color;
                if (wFrac <= 0.5) color = lerpColor('#1a0122', '#681683', wFrac / 0.5);
                else              color = lerpColor('#681683', '#d8b4fe', (wFrac - 0.5) / 0.5);
                obCtx.fillStyle = color;
                obCtx.fillRect(center - barW, y - rowH / 2, barW, rowH);
            }
        });

        // Linea divisoria centrale
        obCtx.strokeStyle = 'rgba(75,85,99,0.5)';
        obCtx.lineWidth = 1;
        obCtx.setLineDash([2, 2]);
        obCtx.beginPath();
        obCtx.moveTo(center, padTop);
        obCtx.lineTo(center, h - padBottom);
        obCtx.stroke();
        obCtx.setLineDash([]);

        // --- 7. LINEA PREZZO ---
        const yPrice = priceToObY(price);
        if (yPrice != null) {
            obCtx.strokeStyle = '#ffffff'; obCtx.setLineDash([4, 2]); obCtx.lineWidth = 1.5;
            obCtx.beginPath(); obCtx.moveTo(0, yPrice); obCtx.lineTo(w, yPrice); obCtx.stroke(); obCtx.setLineDash([]);
            obCtx.fillStyle = '#1e1e2e'; obCtx.fillRect(2, yPrice - 9, 52, 18);
            obCtx.fillStyle = '#d1d5db'; obCtx.textAlign = 'left'; obCtx.textBaseline = 'middle'; obCtx.font = 'bold 9px sans-serif'; 
            obCtx.fillText(price.toFixed(0), 5, yPrice);
        }
    }

const obRo = new ResizeObserver(() => {
    const r = getYRange();
    if (r && lastObData) drawOrderBook(lastObData.book, lastObData.step, lastObData.price, r.min, r.max);
});
obRo.observe(obCanvas);

    if (candleData.length > 0) {

    currentCandleData = candleData;

        // Aggiorna limiti assoluti per lo slider Y (dinamici, seguono il prezzo)
    if (candleData.length > 0) {

    // Sincronizza lo stato del pulsante LIVE

    if (yAxisMode === 'auto') {

                }

        }
    }

    // Pulizia automatica: cancelliamo le frecce più vecchie di 24 ore per non appesantire la RAM
    const signalCutoff = Date.now() - (24 * 60 * 60 * 1000);

    // --- 2. AGGANCIO DELLE FRECCE AL GRAFICO ---

    } else {

    sMap['PriceLine'] = {
        markLine: {

            data: [{

                label: {
                    formatter: `  $${price.toLocaleString('en-US',{minimumFractionDigits:2})}  `,

                    fontWeight: 'bold',

    sMap['MA'] = { data: uiState.showMovingAvg && data.ma ? data.ma : [] };
    if (data.clusters) {

    const aiMarks = [], dBull = [], dBear = [];
    if (uiState.showAiLevels && data.bot) {

        if (data.bot.target > 0) aiMarks.push({

        });

        if (data.bot.support > 0) aiMarks.push({

        });

        if (data.bot.target2 > 0) aiMarks.push({
            yAxis: data.bot.target2,
            name: 'T2',
            label: { ...aiLabelStyleBase, position: 'insideEndTop', backgroundColor: '#3b82f6' },
            lineStyle: { color: '#3b82f6', type: 'dotted', width: 1.5, opacity: 0.6 }
        });
    }

    if (data.dense_bull > 0) dBull.push({ yAxis: data.dense_bull });
    if (data.dense_bear > 0) dBear.push({ yAxis: data.dense_bear });
    sMap['AI Levels'] = { markLine: { data: aiMarks } };
    sMap['DenseBull'] = { markLine: { data: dBull } };
    sMap['DenseBear'] = { markLine: { data: dBear } };

    // FIX 3.1: Unifica tutti gli aggiornamenti serie in un unico setOption batch.
    // Prima bombardavamo ECharts con 10+ setOption consecutive, invalidando il layer
    // grafico e causando micro-animazioni e flickering. Ora facciamo un solo merge.

    chart.setOption({ series: Object.keys(sMap).map(name => ({ name, ...sMap[name] })) }, { lazyUpdate: true });
    setTimeout(() => { updateClusterLegend(); updateCandleWidth(); }, 50); // Piccolo ritardo per permettere a ECharts di aggiornare i dati interni

    if (data.volume_profile && data.volume_profile.length > 0) {
        lastVpRawData = data.volume_profile;
        drawVolumeProfile(data.volume_profile);
    } else {
        lastVpRawData = null;
        chart.setOption({ graphic: [{ type: 'group', id: 'vp-overlay', children: [] }] });
    }

        if (data.delta_history && data.delta_history.length > 0) {
        const deltaHash = _hashArray(data.delta_history);
        const nvecHash = _hashArray(data.nvec_history);
        const dataChanged = (deltaHash !== _lastDeltaHash) || (nvecHash !== _lastNvecHash);

        const maxTs = data.delta_history[data.delta_history.length - 1][0];

        if (dataChanged) {
            _lastDeltaHash = deltaHash;
            _lastNvecHash = nvecHash;

            const deltaPosData = globalDeltaHistory.map(([t, v]) => [t, v >= 0 ? v : null]);
            const deltaNegData = globalDeltaHistory.map(([t, v]) => [t, v < 0 ? v : null]);

            // ── 1. DELTA: usa appendData per i nuovi punti (fast path) ──
            // Full setOption solo al primo caricamento o quando serve un reset completo.
            // appendData evita di ri-processare migliaia di punti ad ogni tick WS.
            const _lastRendTs = deltaChart._lastRenderedTs || 0;
            const newDeltaPts = globalDeltaHistory.filter(p => p[0] > _lastRendTs);
            const useAppend   = _lastRendTs > 0 && newDeltaPts.length > 0 && newDeltaPts.length < 20;

            if (useAppend) {
                // Aggiorna solo i nuovi punti — O(k) invece di O(n)
                const newPosPts = newDeltaPts.map(([t, v]) => [t, v >= 0 ? v : null]);
                const newNegPts = newDeltaPts.map(([t, v]) => [t, v < 0  ? v : null]);
                deltaChart.appendData({ seriesIndex: 0, data: newDeltaPts }); // DeltaLine
                deltaChart.appendData({ seriesIndex: 1, data: newPosPts  }); // DeltaPos
                deltaChart.appendData({ seriesIndex: 2, data: newNegPts  }); // DeltaNeg
                if (uiState.showNvec && globalNvecHistory) {
                    const newNvecPts = globalNvecHistory.filter(p => p[0] > _lastRendTs);
                    if (newNvecPts.length > 0) deltaChart.appendData({ seriesIndex: 3, data: newNvecPts });
                }
                // Pulizia periodica (1 Hz) per eliminare i punti pruned dal front
                const now = Date.now();
                if (!deltaChart._lastCleanup || now - deltaChart._lastCleanup > 2000) {
                    deltaChart._lastCleanup = now;
                    deltaChart.setOption({
                        series: [
                            { name: 'DeltaLine', data: globalDeltaHistory },
                            { name: 'DeltaPos',  data: deltaPosData },
                            { name: 'DeltaNeg',  data: deltaNegData },
                            { name: 'NVEC', data: uiState.showNvec && globalNvecHistory ? globalNvecHistory : [] }
                        ]
                    }, { lazyUpdate: true });
                }
            } else {
                // Full refresh: primo caricamento o reset
                deltaChart.setOption({
                    series: [
                        { name: 'DeltaLine', data: globalDeltaHistory },
                        { name: 'DeltaPos',  data: deltaPosData },
                        { name: 'DeltaNeg',  data: deltaNegData },
                        { name: 'NVEC', data: uiState.showNvec && globalNvecHistory ? globalNvecHistory : [] }
                    ]
                }, { lazyUpdate: true });
                deltaChart._lastCleanup = Date.now();
            }
            if (globalDeltaHistory.length > 0) {
                deltaChart._lastRenderedTs = globalDeltaHistory[globalDeltaHistory.length - 1][0];
            }

            // ── 2. ASSI Y: calcolo limiti ──
            let maxAbsDelta = 50;
            const yAxisWindowMs = 20 * 60 * 1000;
            const yAxisThreshold = maxTs - yAxisWindowMs;

            for (const [t, v] of globalDeltaHistory) {
                if (t >= yAxisThreshold && Math.abs(v) > maxAbsDelta) {
                    maxAbsDelta = Math.abs(v);
                }
            }

            let maxAbsNvec = 0;
            if (uiState.showNvec && globalNvecHistory) {
                for (const [t, v] of globalNvecHistory) {
                    if (t >= yAxisThreshold && Math.abs(v) > maxAbsNvec) {
                        maxAbsNvec = Math.abs(v);
                    }
                }
            }

            const rawDelta = maxAbsDelta * 1.15 + 20;
            let targetDeltaLimit = Math.ceil(rawDelta / 100) * 100;
            targetDeltaLimit = Math.max(100, targetDeltaLimit);

            const prevDeltaLimit = deltaChart._lastLimit || 100;
            if (Math.abs(targetDeltaLimit - prevDeltaLimit) >= 100) {
                deltaChart._lastLimit = targetDeltaLimit;
            } else {
                targetDeltaLimit = prevDeltaLimit;
            }

            const rawNvec = maxAbsNvec * 1.3 + 10;
            let targetNvecLimit = Math.ceil(rawNvec / 20) * 20;
            targetNvecLimit = Math.max(20, targetNvecLimit);

            const prevNvecLimit = deltaChart._lastNvecLimit || 20;
            if (Math.abs(targetNvecLimit - prevNvecLimit) >= 20) {
                deltaChart._lastNvecLimit = targetNvecLimit;
            } else {
                targetNvecLimit = prevNvecLimit;
            }

            // Aggiornamento differito degli assi Y (evita race condition)
            clearTimeout(deltaChart._yUpdateTimer);
            deltaChart._yUpdateTimer = setTimeout(() => {
                // NOTA: NON usare replaceMerge:['yAxis'] — azzera la configurazione
                // dual-axis. Un semplice merge (default) aggiorna solo min/max.
                deltaChart.setOption({
                    yAxis: [
                        { min: -targetDeltaLimit, max: targetDeltaLimit },
                        { min: -targetNvecLimit, max: targetNvecLimit }
                    ]
                }, { lazyUpdate: true });
            }, 50);

        }

        // ── 3. SCROLL ORIZZONTALE ──
        if (deltaAutoScroll) {
            const dWinMs = deltaWindowMinutes * 60 * 1000;
            deltaChart.setOption({
                xAxis: { min: maxTs - dWinMs, max: maxTs + (dWinMs * 0.05), splitLine: { show: false } }
            }, { lazyUpdate: true });
        }

    } else {
        _lastDeltaHash = '';
        _lastNvecHash = '';
        deltaChart.setOption({
            series: [
                { name: 'DeltaLine', data: [] },
                { name: 'DeltaPos', data: [] },
                { name: 'DeltaNeg', data: [] },
                { name: 'NVEC', data: [] }
            ]
        }, { lazyUpdate: true });
    }
    

    // NUOVO CODICE IN updateUI:
    if (data.orderbook) {
        document.getElementById('ob-spread').textContent = `Spread: ${(data.spread || 0).toFixed(2)}`;
        lastObData = { book: data.orderbook, step: currentObStep, price: price };
        window._obNeedsRedraw = true; // Segnaliamo al loop che ci sono nuovi dati
    }

    document.getElementById('bot-direction').textContent = data.bot?.direction || 'NEUTRALE';
    document.getElementById('bot-direction').style.color = data.bot?.color || '#f59e0b';
    document.getElementById('bot-prob').textContent = data.bot?.prob ? `${data.bot.prob.toFixed(1)}%` : '';

    let aiDeltaVal = data.bot?.prob ? (data.bot.prob - 50.0).toFixed(1) : '--';
    document.getElementById('bot-delta').textContent = (aiDeltaVal !== '--' && parseFloat(aiDeltaVal) > 0 ? '+' : '') + aiDeltaVal;

    document.getElementById('bot-power').textContent = (data.ob_power !== undefined && data.ob_power !== null) ? data.ob_power.toFixed(1) : '--';
    document.getElementById('bot-td').textContent = (data.bot?.trade_delta_current !== undefined && data.bot?.trade_delta_current !== null) ? data.bot.trade_delta_current.toFixed(1) : '--';
    document.getElementById('bot-td-score').textContent = (data.bot?.trade_delta_score !== undefined && data.bot?.trade_delta_score !== null) ? data.bot.trade_delta_score.toFixed(2) : '--';
    document.getElementById('bot-td-trend').textContent = (data.bot?.trade_delta_trend !== undefined && data.bot?.trade_delta_trend !== null) ? (data.bot.trade_delta_trend > 0 ? '+' : '') + data.bot.trade_delta_trend.toFixed(2) : '--';

    // Sincronizza TF se il server lo cambia indipendentemente — ma NON retrocedere
    // _lastServerTF se il JSON è ancora per il vecchio TF durante una transizione.
    if (data.current_tf) {
        const activeTFBtn = document.querySelector('.btn-tf.active-tf');
        const activeTF = activeTFBtn?.dataset.tf;
        if (data.current_tf === activeTF) {
            // Il server ha confermato il TF che l'utente ha già selezionato → aggiorna
            window._lastServerTF = data.current_tf;
        } else if (!activeTF) {
            // Nessun bottone attivo (caso iniziale) → aggiorna comunque
            window._lastServerTF = data.current_tf;
            document.querySelectorAll('.btn-tf').forEach(b => b.classList.remove('active-tf'));
            const targetBtn = document.querySelector(`.btn-tf[data-tf="${data.current_tf}"]`);
            if (targetBtn) targetBtn.classList.add('active-tf');
        }
        // Se data.current_tf !== activeTF siamo in transizione: il server non ha ancora
        // processato il cambio TF del client → non aggiornare _lastServerTF né i bottoni
    }

    // Segnala che i dati dei modali sono cambiati — l'update avviene sul timer throttled
    if (activeModals.size > 0) {
        _modalUpdatePending = true;
    }

    pruneOldDeltaData();
}
function changeTF(tf) {
    document.querySelectorAll('.btn-tf').forEach(btn => btn.classList.remove('active-tf'));
    document.querySelector(`.btn-tf[data-tf="${tf}"]`).classList.add('active-tf');

    _hmLoadGeneration++;
    lastAppliedSeq = 0;
    _hmInitialized = false;
    window._hmBucketDuration = CONFIG.HEATMAP_BUCKET_DURATION_BY_TF[tf] || 300;
    window._hmPInterval = CONFIG.ORDERBOOK_STEP_BY_TF[tf] || 5.0;

    heatmapBuckets.clear();
    liveBucketKeys.clear();
    // Reset delta chart render state → forza full setOption al prossimo aggiornamento
    deltaChart._lastRenderedTs = 0;
    deltaChart._lastCleanup    = 0;

    chart.showLoading({ text: 'Caricamento...', color: CONFIG.COLOR_CANDLE_UP, textColor: CONFIG.COLOR_FG });
    chart.setOption({ series: [{ data: [] }] }, { lazyUpdate: true });
    setTimeout(() => { chart.hideLoading(); }, 1000);

    if (wsConnected && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: 'change_tf', tf: tf }));
        loadHeatmapSnapshot(tf, false);
    } else {
        connectWS();  // era: reconnectWebSocket() — funzione non definita
    }

    updateObFilterBadge(tf);
}


function updateClusterLegend() {
    const legend = document.getElementById('cluster-legend');
    if (!legend) return;
    
    // 1. Se l'utente spegne i cluster dal bottone, nascondi tutto
    if (!uiState.showClusters) {
        legend.style.display = 'none';
        return;
    }

    let minVol = Infinity;
    let maxVol = -Infinity;
    let hasData = false;

    // 2. Leggi i dati dal grafico in modo sicuro
    try {
        const opt = chart.getOption();
        if (opt && opt.series) {
            let viewStart = -Infinity;
            let viewEnd = Infinity;
            
            // Cerca il range visibile (zoom)
            if (opt.dataZoom && opt.dataZoom.length > 0) {
                viewStart = opt.dataZoom[0].startValue || -Infinity;
                viewEnd = opt.dataZoom[0].endValue || Infinity;
            }

            const seriesNames = ['Buy Clusters', 'Sell Clusters'];
            for (const s of opt.series) {
                if (seriesNames.includes(s.name) && s.data) {
                    for (const pt of s.data) {
                        const t = pt[0];
                        const vol = pt[2];
                        // Considera solo i cluster attualmente nell'inquadratura
                        if (t >= viewStart && t <= viewEnd && vol > 0) {
                            hasData = true;
                            if (vol < minVol) minVol = vol;
                            if (vol > maxVol) maxVol = vol;
                        }
                    }
                }
            }
        }
    } catch (e) {
        console.error("Errore lettura dati legenda", e);
    }

    // 3. MOSTRA SEMPRE LA LEGENDA
    legend.style.display = 'flex';
    
    const calcSize = (vol) => Math.round(Math.max(5, Math.min(45, Math.sqrt(vol) * 0.85)));

    // 4. Se lo schermo è vuoto (no cluster), mostra i valori di Default
    if (!hasData || minVol === Infinity || maxVol === -Infinity) {
        legend.innerHTML = `
            <span>Attesa Cluster:</span>
            <div class="cl-item"><div class="cl-circle" style="width:10px; height:10px;"></div>100</div>
            <div class="cl-item"><div class="cl-circle" style="width:20px; height:20px;"></div>1K</div>
            <div class="cl-item"><div class="cl-circle" style="width:30px; height:30px;"></div>10K+</div>
        `;
        return;
    }

    // 5. Se ci sono cluster, adatta i valori a quelli reali
    const midVol = (minVol + maxVol) / 2;
    
    const minSize = calcSize(minVol);
    const midSize = calcSize(midVol);
    const maxSize = calcSize(maxVol);

    legend.innerHTML = `
        <span>Cluster Visibili:</span>
        <div class="cl-item">
            <div class="cl-circle" style="width:${minSize}px; height:${minSize}px;"></div>
            ${fmtVol(minVol)}
        </div>
        <div class="cl-item">
            <div class="cl-circle" style="width:${midSize}px; height:${midSize}px;"></div>
            ${fmtVol(midVol)}
        </div>
        <div class="cl-item">
            <div class="cl-circle" style="width:${maxSize}px; height:${maxSize}px;"></div>
            ${fmtVol(maxVol)}
        </div>
    `;
}
function changeVPLookback(hours) {
    ws.send(JSON.stringify({ action: 'change_vp_lookback', hours: parseFloat(hours) }));
    // Forza ridisegno VP dopo che arrivano nuovi dati (al prossimo updateUI)
    setTimeout(() => {
        if (lastVpRawData) drawVolumeProfile(lastVpRawData);
    }, 1000);
}

function changeDeltaWindow(minutes) {
    deltaWindowMinutes = parseInt(minutes) || 10;
    deltaAutoScroll = true;
    const latestTs = Date.now();
    const dWinMs = deltaWindowMinutes * 60 * 1000;
    deltaChart.setOption({
        xAxis: { min: latestTs - dWinMs, max: latestTs + (dWinMs * 0.05), splitLine: { show: false } }
    }, { lazyUpdate: true });
}

function changeModalWindow(type, minutes) {
    modalWindowMinutes[type] = parseInt(minutes) || 30;
    const hc = historyCharts[type];
    if (!hc) return;
    const latestTs = Date.now();
    const winMs = modalWindowMinutes[type] * 60 * 1000;
    hc.setOption({
        xAxis: { min: latestTs - winMs, max: latestTs + (winMs * 0.05) }
    }, { lazyUpdate: true });
}

function setLiveMode() {
    yAxisMode = 'auto';
    deltaAutoScroll = true;
    const btn = document.getElementById('btn-live');
    btn.classList.add('active');
    
    // Se abbiamo dei dati, facciamo saltare subito il grafico alla posizione corretta
    if (currentCandleData && currentCandleData.length > 0) {
        const latestTs = Date.now();
        const tfMs = { '1m': 60000, '5m': 300000, '15m': 900000, '1h': 3600000, '4h': 14400000, '1d': 86400000 };
        const currentTF = document.querySelector('.btn-tf.active-tf')?.dataset.tf || '1h';
        const mainWindowMs = (tfMs[currentTF] || 3600000) * 200;
        
        const xMin = latestTs - mainWindowMs;
        const xMax = latestTs + (mainWindowMs * 0.1);
        
        // SYNC delta chart con la sua finestra indipendente (5/10/20 min)
        const dWinMs = deltaWindowMinutes * 60 * 1000;
        deltaChart.setOption({ xAxis: { min: latestTs - dWinMs, max: latestTs + (dWinMs * 0.05), splitLine: { show: false } } }, { lazyUpdate: true });

        // Attiviamo una transizione rapida di 300ms per ammorbidire il salto
        chart.setOption({
            animationDurationUpdate: 300,
            xAxis: { min: xMin, max: xMax },
            yAxis: { min: window._autoYMin, max: window._autoYMax },
            dataZoom: [
                { startValue: xMin, endValue: xMax }
            ]
        });

        // Spegniamo l'animazione non appena il salto è completato
        setTimeout(() => { chart.setOption({ animationDurationUpdate: 0 }); }, 350);
    }
}

function toggleAction(action, btnId, label) {
    const s = { 'AI': 'showAiLevels', 'Freeze': 'showHeatmapStatic', 'Spotlight': 'showSpotlight', 'NVEC': 'showNvec', 'Clusters': 'showClusters', 'MA': 'showMovingAvg', 'Style': 'showLineChart' };
    uiState[s[label]] = !uiState[s[label]];
    const btn = document.getElementById(btnId);
    
    if (btn) {
        // Abbiamo aggiunto 'Spotlight' qui per fargli fare la lucina Verde/Rossa
        if (['AI', 'NVEC', 'Clusters', 'MA', 'Spotlight'].includes(label)) {
            btn.classList.toggle('on', uiState[s[label]]); 
            btn.classList.toggle('off', !uiState[s[label]]);
            btn.textContent = `${label}: ${uiState[s[label]] ? 'ON' : 'OFF'}`;
        } else {
            btn.classList.toggle('active', uiState[s[label]]);
            btn.textContent = `${label}: ${uiState[s[label]] ? 'ON' : 'OFF'}`;
        }
    }
    
    if (label === 'Clusters') updateClusterLegend();
    
    // IL MOTORE DELLO SPOTLIGHT: Forza il ridisegno immediato della heatmap!
    if (label === 'Spotlight') window._hmNeedsRedraw = true; 
    
    ws.send(JSON.stringify({ action: action }));
}

// --- sBLOCCO AUTOSCALE AL DRAG DEL MOUSE + SYNC ASSE X DELTA PANEL ---
// Quando l'utente trascina o zooma, spegniamo la modalità LIVE
// e sincronizziamo l'asse X del delta chart con il master chart.
chart.on('datazoom', function () {
    yAxisMode = 'manual';
    document.getElementById('btn-live').classList.remove('active');
    updateClusterLegend();
});

// SYNC: zoom sul delta chart aggiorna il master chart (ma non viceversa,
// cosi il selettore 5/10/20 min del delta panel rimane in controllo)
deltaChart.on('datazoom', function () {
    deltaAutoScroll = false;   // l'utente ha interagito → stop autoscroll
    try {
        const opt = deltaChart.getOption();
        if (opt.xAxis && opt.xAxis[0]) {
            const xMin = opt.xAxis[0].min;
            const xMax = opt.xAxis[0].max;
            if (xMin != null && xMax != null) {
                chart.setOption({ xAxis: { min: xMin, max: xMax } }, { lazyUpdate: true });
            }
        }
    } catch (e) { /* ignora */ }
});

window.addEventListener('resize', function () {
    chart.resize(); deltaChart.resize();
    Object.values(historyCharts).forEach(hc => hc && hc.resize());
    window._hmNeedsRedraw = true;
    updateCandleWidth();
    if (lastVpRawData) setTimeout(() => drawVolumeProfile(lastVpRawData), 100);
});

function applyHMUpdates() {
    window._hmNeedsRedraw = true;
}

window.forceHeatmapRedraw = function() {
    window._hmNeedsRedraw = true;
    applyHMUpdates();
};




// Limiti Y persistenti per i modali (fast attack / slow decay)
const _modalYLimits = { bot: { max: 100 }, power: { absMax: 100 }, td: { absMax: 100 } };

// Timer throttled per aggiornamento modali: max 1 Hz per eliminare sfarfallio
setInterval(() => {
    if (!_modalUpdatePending) return;
    _modalUpdatePending = false;

    activeModals.forEach(type => {
        const hc = historyCharts[type];
        if (!hc) return;

        // 1. Ottieni i dati globali aggiornati
        let newData = [];
        if (type === 'bot')       newData = globalBotHistory;
        else if (type === 'power') newData = globalObPowerHistory;
        else if (type === 'td')   newData = globalTradeDeltaHistory;

        if (!newData || newData.length === 0) return;

        const customWindowMs = (modalWindowMinutes[type] || 60) * 60 * 1000;
        const maxTs = newData[newData.length - 1][0];

        // 2. La Chiave: Invece di controllare l'hash, controlliamo l'ultimo timestamp renderizzato
        let chartData = hc.getOption().series[0].data;
        let lastRenderedTs = 0;
        if (chartData && chartData.length > 0) {
            lastRenderedTs = chartData[chartData.length - 1][0];
        }

        // 3. Se l'ultimo punto che abbiamo è già stato disegnato, non fare nulla
        if (maxTs <= lastRenderedTs) {
            // Aggiorniamo solo l'asse X se necessario (per lo scroll)
            if (hc.getOption().xAxis[0].max !== maxTs + (customWindowMs * 0.05)) {
                 hc.setOption({
                    xAxis: { min: maxTs - customWindowMs, max: maxTs + (customWindowMs * 0.05) }
                }, { lazyUpdate: true });
            }
            return;
        }

        // 4. Se ci sono nuovi punti, usa APPEND DATA!
        const newPoints = newData.filter(pt => pt[0] > lastRenderedTs);
        if (newPoints.length > 0 && lastRenderedTs > 0) {
            hc.appendData({ seriesIndex: 0, data: newPoints });
        } else {
            // Primo caricamento o reset: setOption completo
            const modalOptions = { 
                series: [{ data: newData }],
                xAxis: { min: maxTs - customWindowMs, max: maxTs + (customWindowMs * 0.05) }
            };
            hc.setOption(modalOptions);
            return;
        }

        // 5. Gestione Asse Y (con isteresi)
        let yMin = Infinity, yMax = -Infinity;
        const twentyMinMs = 20 * 60 * 1000;
        const yCutoff = maxTs - twentyMinMs;
        for (const pt of newData) {
            if (pt[0] >= yCutoff) {
                const v = pt[1];
                if (v < yMin) yMin = v;
                if (v > yMax) yMax = v;
            }
        }
        if (!isFinite(yMin) || !isFinite(yMax)) { yMin = 0; yMax = 100; }

        let finalYMin, finalYMax;
        if (type === 'bot') {
            finalYMin = 0;
            finalYMax = 100;
        } else {
            // Power e TD: scala simmetrica centrata sullo zero con isteresi
            const lim = _modalYLimits[type];
            const absMax = Math.max(Math.abs(yMin), Math.abs(yMax), 10);
            // Fast attack, slow decay
            lim.absMax = absMax > lim.absMax ? absMax * 1.1 : lim.absMax * 0.97 + absMax * 0.03;
            const rounded = Math.ceil(lim.absMax / 10) * 10;
            finalYMin = -rounded;
            finalYMax = rounded;
        }

        // 6. Aggiorna SOLO gli assi, non la serie!
        hc.setOption({
            xAxis: { min: maxTs - customWindowMs, max: maxTs + (customWindowMs * 0.05) },
            yAxis: { min: finalYMin, max: finalYMax }
        }, { lazyUpdate: true });

    });
}, 1000);

setInterval(() => { if (wsConnected && ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ action: 'ping' })); }, 30000);

window.isDeltaVisible = true;
function toggleDeltaPanel() {
    window.isDeltaVisible = !window.isDeltaVisible;
    const workspace = document.getElementById('workspace');
    const btn = document.getElementById('btn-delta-panel');

    if (window.isDeltaVisible) {
        workspace.classList.remove('hide-delta');
        btn.classList.add('on');
        btn.classList.remove('off');
        btn.textContent = 'Delta: ON';
    } else {
        workspace.classList.add('hide-delta');
        btn.classList.remove('on');
        btn.classList.add('off');
        btn.textContent = 'Delta: OFF';
    }

    // Ricalcolo fluido senza errori
    setTimeout(() => {
        chart.resize();
        if (window.isDeltaVisible && typeof deltaChart !== 'undefined') {
            deltaChart.resize();
        }
        window._hmNeedsRedraw = true;
        if (typeof updateCandleWidth === 'function') updateCandleWidth();
        if (typeof updateSliderFromChart === 'function') updateSliderFromChart();
    }, 50);
}
